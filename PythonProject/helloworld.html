<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Hello, World!</title>
      <style>
          body {
            text-align: center;
          }
      </style>
  </head>
  <body>
    <h1>Hello World!</h1>
    <p id="Time"></p>

    <script>
        function time() {
          const now = new Date();
            document.getElementById("Time").textContent =
                "Date and time: " + now.toLocaleString();
        }
        time();
        setInterval(time, 1000)
    </script>
  </body>
</html>
